<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CityPermit Portal — Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; }
  .header { background: #1a3c5e; color: white; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: normal; }
  .header .logo { font-size: 24px; }
  .container { max-width: 900px; margin: 32px auto; padding: 0 24px; }
  .card { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 24px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; color: #1a3c5e; margin-bottom: 16px; border-bottom: 2px solid #e8edf2; padding-bottom: 8px; }
  .permit-id { font-size: 22px; font-weight: bold; color: #1a3c5e; margin-bottom: 4px; }
  .permit-status { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: bold; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
  .field p { font-size: 14px; margin-top: 2px; }
  .loading { color: #aaa; font-style: italic; font-size: 14px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #1a3c5e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #f0f4f8; text-align: left; padding: 10px 12px; font-size: 12px; text-transform: uppercase; color: #666; }
  td { padding: 10px 12px; border-bottom: 1px solid #eee; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .badge-pending { background: #fff3e0; color: #e65100; }
  .badge-approved { background: #e8f5e9; color: #2e7d32; }
  .note { background: #fffde7; border-left: 3px solid #f9a825; padding: 12px 16px; font-size: 13px; color: #555; border-radius: 0 4px 4px 0; margin-top: 16px; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">🏛️</span>
  <h1>CityPermit Portal — Building & Safety Department</h1>
</div>

<div class="container">

  <div class="card">
    <div class="permit-id">Permit #DEMO-2024-00172</div>
    <div style="margin-top:6px"><span class="permit-status">Under Review</span></div>
    <div class="grid" style="margin-top:16px">
      <div class="field"><label>Applicant</label><p>Sunrise Construction LLC</p></div>
      <div class="field"><label>Address</label><p>4820 Elm Street, Suite 3</p></div>
      <div class="field"><label>Type</label><p>Commercial Renovation</p></div>
      <div class="field"><label>Submitted</label><p>March 12, 2024</p></div>
    </div>
  </div>

  <div class="card">
    <h2>Review Comments</h2>
    <div id="comments-section">
      <p class="loading"><span class="spinner"></span>Loading review comments...</p>
    </div>
  </div>

  <div class="card">
    <h2>Attachments</h2>
    <div id="attachments-section">
      <p class="loading"><span class="spinner"></span>Loading attachments...</p>
    </div>
  </div>

</div>

<script>
  // Comments load after 3 seconds (simulating real async portal)
  setTimeout(() => {
    document.getElementById('comments-section').innerHTML = `
      <table>
        <thead><tr><th>Dept</th><th>Reviewer</th><th>Comment</th><th>Status</th></tr></thead>
        <tbody>
          <tr><td>Fire Safety</td><td>J. Martinez</td><td>Sprinkler layout requires revision on floor 2</td><td><span class="badge badge-pending">Pending</span></td></tr>
          <tr><td>Structural</td><td>A. Patel</td><td>Load calculations approved as submitted</td><td><span class="badge badge-approved">Approved</span></td></tr>
          <tr><td>Electrical</td><td>R. Thompson</td><td>Panel schedule missing from drawings</td><td><span class="badge badge-pending">Pending</span></td></tr>
        </tbody>
      </table>
      <div class="note">3 comments loaded — 2 pending resolution before permit can be issued.</div>
    `;
  }, 3000);

  // Attachments load after 5 seconds (simulating slower second call)
  setTimeout(() => {
    document.getElementById('attachments-section').innerHTML = `
      <table>
        <thead><tr><th>Filename</th><th>Type</th><th>Uploaded</th><th>Size</th></tr></thead>
        <tbody>
          <tr><td>architectural-plans-v3.pdf</td><td>Drawings</td><td>Mar 12, 2024</td><td>4.2 MB</td></tr>
          <tr><td>structural-calculations.pdf</td><td>Engineering</td><td>Mar 12, 2024</td><td>1.8 MB</td></tr>
          <tr><td>fire-suppression-layout.pdf</td><td>Fire Safety</td><td>Mar 15, 2024</td><td>2.1 MB</td></tr>
        </tbody>
      </table>
    `;
  }, 5000);
</script>

</body>
</html>
